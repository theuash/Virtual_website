# ── Nginx config snippet ──────────────────────────────────────────
# Proxies messaging.yourdomain.com → localhost:4001
# Supports WebSocket upgrade (required for Socket.io)
#
# Place this inside your main nginx.conf or as a separate file in
# /etc/nginx/sites-available/messaging and symlink to sites-enabled.

server {
    listen 80;
    server_name messaging.yourdomain.com;

    # Redirect HTTP → HTTPS (remove this block if not using SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name messaging.yourdomain.com;

    # SSL certificates (e.g. from Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/messaging.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/messaging.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── REST + Socket.io proxy ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4001;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for Socket.io
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — keep WebSocket connections alive
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time streaming
        proxy_buffering off;
    }
}
